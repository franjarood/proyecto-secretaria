<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretaría Virtual</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
    <h1>Secretaría Virtual · Xunta de Galicia</h1>
</header>

<main class="main">

    <section class="hero">
        <h2>Gestión de turnos y prematrícula</h2>
        <p>Accede a los servicios del centro de forma rápida y sencilla.</p>

        <div class="buttons">
            <button onclick="irAReservarTurno()">Reservar turno</button>
            <button onclick="irAConsultarTurno()">Consultar turno</button>
        </div>
    </section>

    <section class="cards">

        <div class="card">
            <h3>Cita previa</h3>
            <p>Reserva tu turno para secretaría</p>
        </div>

        <div class="card">
            <h3>Prematrícula</h3>
            <p>Rellena tus datos online</p>
        </div>

        <div class="card">
            <h3>Documentación</h3>
            <p>Sube o consulta documentos</p>
        </div>

    </section>

</main>

<script src="js/main.js"></script>
</body>
</html>
