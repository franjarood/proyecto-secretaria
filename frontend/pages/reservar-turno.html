<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar turno | Secretaría Virtual</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header class="header">
    <h1>Secretaría Virtual · Xunta de Galicia</h1>
</header>

<main class="main">

    <section class="hero">
        <h2>Reservar turno</h2>
        <p>Solicita una cita para ser atendido en secretaría.</p>
    </section>

    <section class="form-section">

        <form id="formReserva" class="form-card">

            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" required>

            <label for="apellidos">Apellidos</label>
            <input type="text" id="apellidos" required>

            <label for="email">Correo electrónico</label>
            <input type="email" id="email" required>

            <label for="fechaCita">Fecha de la cita</label>
            <input type="date" id="fechaCita" required>

            <label for="horaCita">Hora de la cita</label>
            <input type="time" id="horaCita" required>

            <label for="tipoTramite">Tipo de trámite</label>
            <select id="tipoTramite" required>
                <option value="">Selecciona un trámite</option>
            </select>

            <label for="observaciones">Observaciones</label>
            <textarea id="observaciones" rows="4"></textarea>

            <button type="submit">Confirmar reserva</button>

            <p id="mensajeReserva" class="mensaje"></p>

        </form>

        <button class="btn-volver" onclick="volverInicio()">Volver al inicio</button>

    </section>

</main>

<script src="../js/reservar-turno.js"></script>
</body>
</html>
