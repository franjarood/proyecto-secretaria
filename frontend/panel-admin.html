<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Secretaría Virtual</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/botones.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/cards.css">
</head>
<body data-rol="admin">

  <!-- ==================== SIDEBAR ==================== -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">🎓</div>
      <div class="sidebar-brand-text">Secretaría Virtual</div>
    </div>

    <nav id="sidebarNav" class="sidebar-nav">
      <!-- Se llena dinámicamente con Sidebar.init() -->
    </nav>

    <div id="sidebarUser" class="sidebar-user">
      <!-- Se llena dinámicamente con Sidebar.init() -->
    </div>
  </aside>

  <!-- Overlay para móvil -->
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <!-- ==================== CONTENIDO PRINCIPAL ==================== -->
  <div class="main-content">

    <!-- ==================== HEADER ==================== -->
    <header class="header">
      <button id="toggleSidebar" class="header-toggle">☰</button>

      <div class="header-search">
        <svg class="header-search-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 0 0 1.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 0 0-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 0 0 5.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Buscar...">
        <kbd class="header-search-shortcut">⌘K</kbd>
      </div>

      <div class="header-actions">
        <button id="notificationsBtn" class="header-action-btn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
          </svg>
          <span class="notification-count">0</span>
        </button>

        <div id="headerUser" class="header-user">
          <!-- Se llena dinámicamente con Header.init() -->
        </div>
      </div>
    </header>

    <!-- ==================== CONTENIDO ==================== -->
    <div class="content-wrapper">

      <!-- Hero Section -->
      <div class="hero-section">
        <div class="hero-content">
          <h1 class="hero-title">
            ⚙️ Panel de Administración
          </h1>
          <p class="hero-subtitle">
            Esta sección está en construcción. Aquí podrás gestionar el sistema completo, usuarios, permisos, configuración y más.
          </p>
        </div>
      </div>

      <!-- Placeholder Content -->
      <div class="section">
        <div class="section-header">
          <div>
            <h2 class="section-title">Próximamente</h2>
            <p class="section-subtitle">Dashboard completo con todas las funcionalidades</p>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="flex-center" style="flex-direction: column; gap: 24px; padding: 48px 24px;">
              <div class="spinner"></div>
              <p class="text-secondary">Página en construcción</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ==================== SCRIPTS ==================== -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/header.js"></script>
  <script src="js/components/asistente.js"></script>

  <script>
    // Verificar autenticación
    if (!Auth.requireAuth()) {
      // Ya redirige automáticamente
    } else {
      const userData = Auth.getCurrentUser();
      console.log('Usuario autenticado:', userData);

      // Inicializar Sidebar con menú básico de admin
      const menuItems = [
        { icon: '🏠', label: 'Inicio', href: 'panel-admin.html', active: true },
        { icon: '📊', label: 'Dashboard', href: '#dashboard' },
        { icon: '👥', label: 'Usuarios', href: '#usuarios' },
        { icon: '🔐', label: 'Permisos', href: '#permisos' },
        { icon: '📋', label: 'Auditoría', href: '#auditoria' },
        { icon: '🔧', label: 'Sistema', href: '#sistema' },
        { icon: '⚙️', label: 'Configuración', href: '#configuracion' }
      ];

      Sidebar.init(menuItems, userData);

      // Inicializar Header
      Header.init(userData, 0);
    }
  </script>

</body>
</html>
